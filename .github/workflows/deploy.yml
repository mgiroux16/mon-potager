name: Déploiement GitHub Pages

# Reconstruit et publie l'appli à chaque envoi sur main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Droits nécessaires pour publier sur Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on ne coupe pas un déploiement déjà lancé.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm install (et pas npm ci) : le lock généré sur macOS ne liste pas
      # les mêmes binaires natifs optionnels que ceux résolus sur Linux.
      - run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
